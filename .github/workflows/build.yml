name: 编译Newifi D2 ImmortalWrt
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository files
        uses: actions/checkout@v4

      - name: 【调试】列出仓库根目录全部文件
        run: ls -la

      - name: Install build dependencies
        run: |
          set -x
          sudo apt update
          sudo apt install -y build-essential libncurses-dev libssl-dev bison flex python3 python3-distutils git wget unzip

      - name: Clone ImmortalWrt source
        run: |
          set -x
          git clone --depth=1 https://github.com/immortalwrt/immortalwrt.git openwrt

      - name: 添加Passwall2全套软件源
        working-directory: ./openwrt
        run: |
          set -x
          echo "src-git passwall_packages https://github.com/xiaorouji/openwrt-passwall-packages.git;main" >> feeds.conf.default
          echo "src-git passwall https://github.com/xiaorouji/openwrt-passwall.git;main" >> feeds.conf.default
          echo "src-git passwall2 https://github.com/xiaorouji/openwrt-passwall2.git;main" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 载入编译配置文件
        run: |
          set -x
          cp .config openwrt/.config

      - name: make defconfig
        working-directory: ./openwrt
        run: |
          set -x
          make defconfig

      - name: Compile firmware
        working-directory: ./openwrt
        run: |
          set -x
          make -j2 V=s

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: Newifi-D2固件-PW2内置
          path: openwrt/bin/targets/ramips/mt7621/*.bin
